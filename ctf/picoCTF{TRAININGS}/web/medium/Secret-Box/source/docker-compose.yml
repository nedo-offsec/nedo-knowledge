services:
  app:
    build: 
      context: ./app
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: always
    environment:
      USERPASSWORD: password
      FLAG: picoCTF{fake_flag}
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: secretbox
      DB_PORT: 5432
  db:
    build: ./db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secretbox
    ports:
      - "5432:5432"
